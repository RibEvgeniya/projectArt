{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Вход</h2>

        {% if next %}
            <div class="alert alert-info">
                Для выполнения этого действия необходимо войти в систему.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="mb-3">
                <label for="username" class="form-label">Имя пользователя</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">Отмена</a>
        </form>
        <p class="mt-3">
            Нет аккаунта? <a href="{% url 'users:register' %}?next={{ next }}">Зарегистрироваться</a>
        </p>
        <p class="mt-2">
            <a href="{% url 'home' %}" class="text-muted">← Продолжить как гость</a>
        </p>
    </div>
</div>
{% endblock %}
